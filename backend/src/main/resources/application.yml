spring:
  application:
    name: ${SPRING_APPLICATION_NAME}

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

    hikari:
      maximum-pool-size: 20
      pool-name: SeulgiTuiumPool

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      timeout: ${REDIS_TIMEOUT:3000ms}

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: ${KAKAO_CLIENT_AUTH_METHOD}
            authorization-grant-type: ${KAKAO_AUTH_GRANT_TYPE}
            redirect-uri: ${KAKAO_REDIRECT_URI}
            scope:
              - profile_nickname
              - account_email

        provider:
          kakao:
            authorization-uri: ${KAKAO_AUTHORIZATION_URI}
            token-uri: ${KAKAO_TOKEN_URI}
            user-info-uri: ${KAKAO_USER_INFO_URI}
            user-name-attribute: ${KAKAO_USER_NAME_ATTRIBUTE}

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    open-in-view: false

    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

        jdbc:
          batch_size: 50

        order_inserts: true
        order_updates: true

  output:
    ansi:
      enabled: always

kakao:
  admin-key: ${KAKAO_ADMIN_KEY}
  unlink-url: "https://kapi.kakao.com/v1/user/unlink"

gemini:
  api:
    key: ${GEMINI_API_KEY:dummy_key}


urimalsaem_api_key: ${URIMALSAEM_API_KEY:dummy_key}

jwt:
  key: ${JWT_KEY}
  issuer: ${JWT_ISSUER}
  access-token-expiration-seconds: ${JWT_ACCESS_TOKEN_EXPIRATION_MS}
  refresh-token-expiration-seconds: ${JWT_REFRESH_TOKEN_EXPIRATION_MS}

security:
  password:
    pepper: ${PASSWORD_PEPPER}

server:
  tomcat:
    threads:
      max: 200
      min-spare: 10
    max-connections: 10000
    accept-count: 100
    connection-timeout: 20000

